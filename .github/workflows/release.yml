name: release

on:
  # Publish only after the complete pinned-stack CI workflow succeeds. The
  # workflow_run guard below excludes pull requests and stale main commits.
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: canonical-container-release
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  WEB_IMAGE: ghcr.io/canonical-cloud/canonical-web-server
  REVOKER_IMAGE: ghcr.io/canonical-cloud/canonical-session-revoker
  RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}

jobs:
  publish:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Use HTTPS for public submodules
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_SHA }}
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false
      - name: Refuse a stale or unreviewed release
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${RELEASE_SHA}"
          current_main="$(git ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" refs/heads/main | awk '{print $1}')"
          if [[ "${RELEASE_SHA}" != "${current_main}" ]]; then
            echo "error: ${RELEASE_SHA} is not current main (${current_main}); refusing stale release" >&2
            exit 1
          fi
          bash scripts/audit-repo-state.sh
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish customer web image
        id: web
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: apps/canonical-web-server.rs
          target: web
          push: true
          pull: true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ env.RELEASE_SHA }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ env.RELEASE_SHA }}
            org.opencontainers.image.title=canonical-web-server
          cache-from: type=gha,scope=canonical-web
          cache-to: type=gha,mode=max,scope=canonical-web
          provenance: mode=max
          sbom: true
      - name: Attest customer web image
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-name: ${{ env.WEB_IMAGE }}
          subject-digest: ${{ steps.web.outputs.digest }}
          push-to-registry: true
      - name: Build and publish no-ingress revoker image
        id: revoker
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: apps/canonical-web-server.rs
          target: revoker
          push: true
          pull: true
          tags: |
            ${{ env.REVOKER_IMAGE }}:${{ env.RELEASE_SHA }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ env.RELEASE_SHA }}
            org.opencontainers.image.title=canonical-session-revoker
          cache-from: type=gha,scope=canonical-revoker
          cache-to: type=gha,mode=max,scope=canonical-revoker
          provenance: mode=max
          sbom: true
      - name: Attest no-ingress revoker image
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-name: ${{ env.REVOKER_IMAGE }}
          subject-digest: ${{ steps.revoker.outputs.digest }}
          push-to-registry: true
      - name: Record the GitOps promotion inputs
        shell: bash
        env:
          WEB_DIGEST: ${{ steps.web.outputs.digest }}
          REVOKER_DIGEST: ${{ steps.revoker.outputs.digest }}
        run: |
          {
            echo "## canonical.cloud release"
            echo
            echo "- monorepo: \`${RELEASE_SHA}\`"
            echo "- web: \`${WEB_IMAGE}@${WEB_DIGEST}\`"
            echo "- revoker: \`${REVOKER_IMAGE}@${REVOKER_DIGEST}\`"
            echo
            echo "Promote these exact digests in ORESoftware/k8s-cluster; Argo CD is the only deployment writer."
            echo
            echo '```sh'
            printf 'node remote/argocd/canonical-cloud/promote-release.mjs \\\n'
            printf '  --release-sha %s \\\n' "${RELEASE_SHA}"
            printf '  --web-digest %s \\\n' "${WEB_DIGEST}"
            printf '  --revoker-digest %s\n' "${REVOKER_DIGEST}"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
