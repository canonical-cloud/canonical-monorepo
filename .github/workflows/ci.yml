name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege: the workflow only reads the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref so a push doesn't pile up runners.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      # Submodule URLs in .gitmodules use SSH (git@github.com:...), but CI
      # authenticates over HTTPS with the default GITHUB_TOKEN. Rewrite SSH ->
      # HTTPS BEFORE checkout so it can init every submodule with that token.
      # All app submodules are public.
      - name: Use HTTPS for submodule fetch
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"
      # Actions are pinned to commit SHAs (supply-chain hardening); the trailing
      # comment records the human-readable version.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          fetch-depth: 0
          # Drop the checkout token from the local git config afterward; the audit
          # step only re-fetches public submodules, which needs no auth.
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      # Superproject contract specs; need submodules checked out (the contract
      # asserts apps/ dirs exist and reads each app's agents.md).
      - run: node --test tests/*.test.mjs
      # Blocking gate: submodule wiring (SSH + branch=main), pins pushed to
      # origin/main, service Dockerfiles are distroless, no tracked secrets /
      # conflict markers.
      - name: audit repo state
        run: bash scripts/audit-repo-state.sh

  # This superproject is the deployment vehicle: a committed pin set IS the
  # release, and docs/deploy.md defines "checkout + ./build.sh" as the
  # reproducible shipped stack. Prove that contract on every pin change by
  # building the whole stack (Astro site, app client with its tests, locked
  # Rust workspace binaries) at exactly the pinned submodule SHAs.
  integration-build:
    # Gate on the audit job: it enforces that every submodule URL stays inside
    # canonical-cloud BEFORE this job checks out submodules recursively and
    # executes their build scripts (npm postinstall, cargo build.rs). Without
    # this ordering a PR could repoint a submodule at an attacker repo and get
    # code execution here in parallel with the failing audit.
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Use HTTPS for submodule fetch
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      # rustup honors apps/canonical-web-server.rs/rust-toolchain.toml; this
      # just guarantees a rustup-managed toolchain is present on the runner.
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/canonical-web-server.rs
      - name: Build the pinned stack
        run: ./build.sh
      # Boot the freshly built server with both built asset trees and prove the
      # cross-repo runtime contracts: marketing fallback, /app-assets mount,
      # health/readiness, JSON 404s, interface conformance, and isolated
      # no-ingress revoker startup.
      - name: Stack smoke (runtime contracts vs pinned interfaces)
        run: bash scripts/stack-smoke.sh
